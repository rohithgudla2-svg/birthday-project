<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories 📸</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    color:white;
    text-align:center;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
    background: linear-gradient(135deg, #2b0000, #4a0000, #7a0000);
}

/* Floating red hearts background */
.heart{
    position:absolute;
    bottom:-100px;
    width:25px;
    height:25px;
    background:rgba(255,0,0,0.5);
    transform:rotate(45deg);
    animation:floatHeart linear infinite;
    z-index:0;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:25px;
    height:25px;
    background:rgba(255,0,0,0.5);
    border-radius:50%;
}

.heart::before{ top:-12px; left:0; }
.heart::after{ top:0; left:-12px; }

@keyframes floatHeart{
    from{ transform:translateY(0) rotate(45deg); opacity:1; }
    to{ transform:translateY(-120vh) rotate(405deg); opacity:0; }
}

h1{
    margin:30px 0;
    font-size:42px;
    position:relative;
    z-index:2;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #fff; }
    to{ text-shadow:0 0 20px #ff4d6d; }
}

.wall{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:30px;
    position:relative;
    z-index:2;
}

.card{
    background:white;
    padding:12px;
    width:220px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    transition:0.4s;
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:10px;
}

.card p{
    color:black;
    font-size:16px;
    margin-top:10px;
    font-weight:bold;
}

.back{
    display:inline-block;
    margin:30px;
    padding:12px 25px;
    border-radius:25px;
    background:rgba(255,255,255,0.2);
    color:white;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>📸 Our Beautiful Memories</h1>

<div class="wall">

    <div class="card">
        <img src="{{ url_for('static', filename='beautiful.jpg') }}">
        <p>Beautiful😍</p>
    </div>

    <div class="card">
        <img src="{{ url_for('static', filename='cute.jpg') }}">
        <p>Cutetest😊</p>
    </div>

    <div class="card">
        <img src="{{ url_for('static', filename='smile.jpg') }}">
        <p> Beautiful Smile🤞</p>
    </div>

    <div class="card">
        <img src="{{ url_for('static', filename='traditional.jpg') }}">
        <p>Traditional🤗</p>
    </div>

    <div class="card">
        <img src="{{ url_for('static', filename='first.jpg') }}">
        <p>First Meet❤️</p>
    </div>

    <div class="card">
        <img src="{{ url_for('static', filename='memeory.jpg') }}">
        <p>Best Memories ✨</p>
    </div>

</div>

<a href="/home" class="back">⬅ Back</a>

</body>
</html>
